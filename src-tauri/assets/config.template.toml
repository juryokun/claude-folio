# Folio configuration file
# Location: ~/.config/folio/config.toml
# Restart the app to apply changes.

# Display language: "en" (English) or "ja" (Japanese)
language = "en"

# -------------------------
# Sidebar
# -------------------------
[sidebar]

# Items shown in the Favorites section.
# Available values: home, desktop, documents, downloads, pictures, music, movies, applications, public
favorites = [
  "home",
  "desktop",
  "documents",
  "downloads",
  "pictures",
  "music",
  "movies",
  "applications",
]

# -------------------------
# Appearance
# -------------------------
[appearance]

# Date columns — each can be shown/hidden independently with its own format.
# format: "auto" = today/yesterday labels (今日 12:34:56), or strftime e.g. "%Y/%m/%d %H:%M:%S"

[appearance.date_modified]
show = true
format = "auto"

[appearance.date_created]
show = false
format = "auto"

[appearance.date_accessed]
show = false
format = "auto"

# File size unit
#   "binary"  → KiB / MiB / GiB (1024-based)
#   "decimal" → KB / MB / GB  (1000-based)
size_unit = "binary"

# -------------------------
# Editor
# -------------------------
[editor]

# Command used to open files with the `e` key.
# Leave empty to use the OS default app (same as `o` key).
# Examples: "code", "nvim", "emacs", "subl"
command = ""

# -------------------------
# Terminal
# -------------------------
[terminal]

# Option A: App name passed to `open -a <app> <dir>`.
# Works with Terminal.app, iTerm, Warp, Ghostty, etc.
# Leave empty to use Terminal.app.
# Examples: "iTerm", "Warp", "Ghostty"
app = ""

# Option B: Direct command for terminals that don't support `open -a`.
# The directory path is appended as the last argument.
# Takes precedence over `app` when set.
# Examples:
# command = "alacritty --working-directory"
# command = "kitty --directory"

# -------------------------
# Keybindings
# -------------------------
[keymap]
# Override default keybindings.
# Values are lists of key sequences. Sequences are space-separated key names.
#
# Examples:
#   cursor_down     = ["j", "ArrowDown"]   # assign multiple keys
#   delete_selected = ["d d"]              # 2-key sequence
#   sort_name       = ["s n"]
#
# Available actions:
#
# --- Cursor ---
#   cursor_down        Move cursor down          (default: j / ↓)
#   cursor_up          Move cursor up            (default: k / ↑)
#   cursor_first       Go to first item          (default: g g)
#   cursor_last        Go to last item           (default: G)
#
# --- Navigation ---
#   navigate_up        Go to parent directory    (default: h / ←)
#   navigate_into      Enter directory / open    (default: l / → / Enter)
#   go_back            Go back in history        (default: H)
#   go_forward         Go forward in history     (default: L)
#
# --- File operations ---
#   toggle_select      Toggle selection          (default: Space)
#   delete_selected    Move to trash             (default: d d)
#   cut_selected       Cut                       (default: x x)
#   yank_selected      Copy                      (default: y y)
#   paste              Paste                     (default: p)
#   rename             Rename                    (default: r)
#   new_dir            Create new folder         (default: a)
#   new_file           Create new file           (default: A)
#   copy_path          Copy path to clipboard    (default: y p)
#   copy_name          Copy filename to clipboard(default: y n)
#
# --- Open ---
#   open_selected      Open file                 (default: l / Enter)
#   open_terminal      Open terminal here        (default: o)
#   open_terminal_here Open terminal (current)   (default: T)
#   open_with_app      Open with specific app    (default: O)
#   open_editor        Open with editor          (default: e)
#
# --- Search & command ---
#   enter_search       Incremental search        (default: /)
#   enter_command      Command palette           (default: :)
#
# --- Tabs ---
#   new_tab            New tab                   (default: t)
#   close_tab          Close tab                 (default: q)
#   next_tab           Next tab                  (default: ])
#   prev_tab           Previous tab              (default: [)
#
# --- View ---
#   toggle_hidden      Toggle hidden files       (default: .)
#   toggle_sidebar     Toggle sidebar            (default: \)
#   toggle_preview     Toggle preview panel      (default: P)
#   reload             Reload directory          (default: R)
#   show_help          Show help                 (default: ?)
#
# --- Bookmarks & navigation ---
#   add_bookmark       Add to bookmarks          (default: B)
#   open_bookmark_picker  Search bookmarks       (default: b)
#   focus_path_bar     Focus path bar            (default: Ctrl+L)
#   focus_zoxide       Zoxide search             (default: z)
#
# --- Sort ---
#   sort_name          Sort by name (asc)        (default: s n)
#   sort_name_desc     Sort by name (desc)       (default: s N)
#   sort_time          Sort by time (asc)        (default: s t)
#   sort_time_desc     Sort by time (desc)       (default: s T)
#   sort_reverse       Reverse sort order        (default: s r)
