name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Folio ${{ github.ref_name }}'
          releaseBody: |
            See the assets below to download the installer.

            ## Installation (macOS)

            The app is not yet notarized with Apple. After installing from the DMG, macOS may show **"Folio is damaged and can't be opened."**

            To fix this, run the following command in Terminal:

            ```bash
            xattr -dr com.apple.quarantine /Applications/Folio.app
            ```

            Then open the app normally.
          releaseDraft: true
          prerelease: false
